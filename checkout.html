<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - EventTicketing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="animations.css">
    <link rel="stylesheet" href="dark-mode.css">

    <style>
        .checkout-steps {
            display: flex;
            justify-content: center;
            margin-bottom: 3rem;
        }
        .step {
            text-align: center;
            flex: 1;
            max-width: 200px;
            position: relative;
        }
        .step-circle {
            width: 50px;
            height: 50px;
            background: #e0e0e0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.5rem;
            font-weight: bold;
        }
        .step.active .step-circle {
            background: var(--primary);
            color: white;
        }
        .step.completed .step-circle {
            background: var(--success);
            color: white;
        }
        .step-line {
            position: absolute;
            top: 25px;
            left: 50%;
            width: 100%;
            height: 2px;
            background: #e0e0e0;
            z-index: -1;
        }
        .step:last-child .step-line {
            display: none;
        }
        .order-summary {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            position: sticky;
            top: 100px;
        }
        .payment-method {
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 1rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .payment-method.selected {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }
        .card-element {
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 0.75rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-ticket-alt text-primary"></i> EventTicketing</a>
            <div><i class="fas fa-lock text-muted"></i> Secure Checkout</div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="checkout-steps">
            <div class="step active" id="step1">
                <div class="step-circle">1</div>
                <div>Review Order</div>
                <div class="step-line"></div>
            </div>
            <div class="step" id="step2">
                <div class="step-circle">2</div>
                <div>Payment</div>
                <div class="step-line"></div>
            </div>
            <div class="step" id="step3">
                <div class="step-circle">3</div>
                <div>Confirmation</div>
            </div>
        </div>

        <div class="row" id="checkout-content">
            <div class="col-lg-8" id="step-content">
                <!-- Dynamic content -->
            </div>
            <div class="col-lg-4">
                <div class="order-summary">
                    <h5>Order Summary</h5>
                    <div id="order-items"></div>
                    <hr>
                    <div class="d-flex justify-content-between">
                        <span>Subtotal:</span>
                        <span id="subtotal">$0.00</span>
                    </div>
                    <div class="d-flex justify-content-between">
                        <span>Service Fee (5%):</span>
                        <span id="service-fee">$0.00</span>
                    </div>
                    <div class="d-flex justify-content-between fw-bold mt-2">
                        <span>Total:</span>
                        <span id="total">$0.00</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    
    <script>
        let orderData = null;
        let currentStep = 1;
        
        document.addEventListener('DOMContentLoaded', async () => {
            if (!Auth.isAuthenticated()) {
                window.location.href = '/login';
                return;
            }
            await loadOrderData();
            renderStep1();
        });
        
        async function loadOrderData() {
            // Get reservation ID from URL or localStorage
            const urlParams = new URLSearchParams(window.location.search);
            const reservationId = urlParams.get('reservation') || localStorage.getItem('reservationData');
            
            if (!reservationId) {
                Utils.showToast('No active reservation', 'error');
                setTimeout(() => window.location.href = '/events', 2000);
                return;
            }
            
            try {
                // If we have reservation data from localStorage, use it
                if (typeof reservationId === 'string' && reservationId.startsWith('{')) {
                    const reservationData = JSON.parse(reservationId);
                    orderData = await createOrderData(reservationData);
                } else {
                    // Otherwise, try to get from API
                    const data = await api.getOrder(reservationId);
                    orderData = data;
                }
                
                updateOrderSummary();
                checkReservationExpiry();
            } catch (error) {
                console.error('Error loading order:', error);
                Utils.showToast('Failed to load order details', 'error');
                setTimeout(() => window.location.href = '/events', 2000);
            }
        }
        
        async function createOrderData(reservationData) {
            // Mock order data based on reservation
            const event = await api.getEvent(reservationData.event_id);
            let subtotal = 0;
            const items = [];
            
            for (const [categoryId, quantity] of Object.entries(reservationData.tickets)) {
                const category = event.ticket_categories.find(c => c.id === parseInt(categoryId));
                if (category) {
                    const itemSubtotal = category.price * quantity;
                    subtotal += itemSubtotal;
                    items.push({
                        ticket_category_name: category.name,
                        quantity: quantity,
                        unit_price: category.price,
                        subtotal: itemSubtotal
                    });
                }
            }
            
            const serviceFee = subtotal * 0.05;
            const totalAmount = subtotal + serviceFee;
            
            return {
                id: reservationData.reservation_id,
                event_title: event.title,
                event_date: event.event_date,
                event_time: event.event_time,
                venue_name: event.venue_name,
                items: items,
                subtotal: subtotal,
                service_fee: serviceFee,
                total_amount: totalAmount,
                order_number: 'ORD-' + Date.now(),
                expires_at: reservationData.expires_at
            };
        }
        
        function updateOrderSummary() {
            if (!orderData) return;
            document.getElementById('subtotal').textContent = Utils.formatCurrency(orderData.subtotal);
            document.getElementById('service-fee').textContent = Utils.formatCurrency(orderData.service_fee);
            document.getElementById('total').textContent = Utils.formatCurrency(orderData.total_amount);
            
            document.getElementById('order-items').innerHTML = (orderData.items || []).map(item => `
                <div class="d-flex justify-content-between mb-2">
                    <div>
                        <strong>${item.ticket_category_name}</strong>
                        <br><small>x${item.quantity}</small>
                    </div>
                    <div>${Utils.formatCurrency(item.subtotal)}</div>
                </div>
            `).join('');
        }
        
        function checkReservationExpiry() {
            if (!orderData || !orderData.expires_at) return;
            
            const expireTime = new Date(orderData.expires_at).getTime();
            const now = new Date().getTime();
            
            if (now > expireTime) {
                Utils.showToast('Reservation has expired. Please select tickets again.', 'error');
                localStorage.removeItem('reservationData');
                setTimeout(() => window.location.href = `/event-detail?id=${orderData.event_id}`, 2000);
                return;
            }
            
            // Show countdown timer
            const timeLeft = expireTime - now;
            const minutes = Math.floor(timeLeft / 60000);
            const seconds = Math.floor((timeLeft % 60000) / 1000);
            
            const timerHtml = `
                <div class="alert alert-warning mb-3">
                    <i class="fas fa-clock me-2"></i>
                    Reservation expires in: ${minutes}:${seconds.toString().padStart(2, '0')}
                </div>
            `;
            
            const container = document.getElementById('step-content');
            if (container && currentStep === 1) {
                container.insertAdjacentHTML('afterbegin', timerHtml);
            }
        }
        
        function renderStep1() {
            const container = document.getElementById('step-content');
            container.innerHTML = `
                <div class="card mb-4">
                    <div class="card-body">
                        <h4>Event Details</h4>
                        <p><strong>${orderData?.event_title}</strong><br>
                        ${Utils.formatDate(orderData?.event_date)} at ${orderData?.event_time}<br>
                        ${orderData?.venue_name}</p>
                    </div>
                </div>
                <div class="card mb-4">
                    <div class="card-body">
                        <h4>Ticket Details</h4>
                        ${(orderData?.items || []).map(item => `
                            <div class="d-flex justify-content-between mb-2">
                                <span>${item.ticket_category_name} x${item.quantity}</span>
                                <span>${Utils.formatCurrency(item.unit_price)} each</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <button class="btn btn-primary btn-lg w-100" onclick="nextStep()">Proceed to Payment</button>
            `;
        }
        
        function nextStep() {
            currentStep++;
            updateSteps();
            if (currentStep === 2) renderStep2();
            if (currentStep === 3) renderStep3();
        }
        
        function updateSteps() {
            for (let i = 1; i <= 3; i++) {
                const step = document.getElementById(`step${i}`);
                if (i < currentStep) step.classList.add('completed');
                if (i === currentStep) step.classList.add('active');
            }
        }
        
        function renderStep2() {
            const container = document.getElementById('step-content');
            container.innerHTML = `
                <div class="card">
                    <div class="card-body">
                        <h4>Payment Method</h4>
                        <div class="payment-method" onclick="selectPayment('card')" id="method-card">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="payment" id="card-radio">
                                <label class="form-check-label" for="card-radio">
                                    <i class="fab fa-cc-visa"></i> <i class="fab fa-cc-mastercard"></i> Credit/Debit Card
                                </label>
                            </div>
                        </div>
                        <div class="payment-method" onclick="selectPayment('paypal')" id="method-paypal">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="payment" id="paypal-radio">
                                <label class="form-check-label" for="paypal-radio">
                                    <i class="fab fa-paypal"></i> PayPal
                                </label>
                            </div>
                        </div>
                        
                        <div id="card-form" style="display: none;" class="mt-3">
                            <div class="mb-3">
                                <label>Card Number</label>
                                <input type="text" class="form-control" id="card-number" placeholder="4242 4242 4242 4242">
                            </div>
                            <div class="row">
                                <div class="col-6">
                                    <label>Expiry Date</label>
                                    <input type="text" class="form-control" placeholder="MM/YY">
                                </div>
                                <div class="col-6">
                                    <label>CVV</label>
                                    <input type="password" class="form-control" placeholder="123">
                                </div>
                            </div>
                            <small class="text-muted mt-2 d-block">Test card: 4242 4242 4242 4242</small>
                        </div>
                        
                        <button class="btn btn-primary w-100 mt-4" onclick="processPayment()">Pay ${Utils.formatCurrency(orderData?.total_amount)}</button>
                    </div>
                </div>
            `;
        }
        
        window.selectPayment = (method) => {
            document.querySelectorAll('.payment-method').forEach(el => el.classList.remove('selected'));
            document.getElementById(`method-${method}`).classList.add('selected');
            document.getElementById('card-form').style.display = method === 'card' ? 'block' : 'none';
        };
        
        async function processPayment() {
            // Validate payment method selection
            const selectedMethod = document.querySelector('input[name="payment"]:checked');
            if (!selectedMethod) {
                Utils.showToast('Please select a payment method', 'error');
                return;
            }
            
            // Validate card details if card payment selected
            if (selectedMethod.id === 'card-radio') {
                const cardNumber = document.getElementById('card-number')?.value?.replace(/\s/g, '');
                const expiry = document.querySelector('input[placeholder="MM/YY"]')?.value;
                const cvv = document.querySelector('input[placeholder="123"]')?.value;
                
                if (!cardNumber || !expiry || !cvv) {
                    Utils.showToast('Please fill in all card details', 'error');
                    return;
                }
                
                // Simple card validation (test card: 4242424242424242)
                if (cardNumber !== '4242424242424242' && !isValidCard(cardNumber)) {
                    Utils.showToast('Invalid card number. Use test card: 4242 4242 4242 4242', 'error');
                    return;
                }
            }
            
            Utils.showLoading();
            try {
                // Simulate payment processing
                await simulatePayment();
                
                // Create order
                const orderData = {
                    reservation_id: orderData.id,
                    payment_method: selectedMethod.id === 'card-radio' ? 'card' : 'paypal',
                    total_amount: orderData.total_amount
                };
                
                const result = await api.createOrder(orderData);
                
                // Clear reservation data
                localStorage.removeItem('reservationData');
                
                // Show success
                currentStep = 3;
                updateSteps();
                renderStep3();
                
                Utils.showToast('Payment successful! Your tickets have been confirmed.', 'success');
            } catch (error) {
                console.error('Payment error:', error);
                Utils.showToast('Payment failed. Please try again.', 'error');
            } finally {
                Utils.hideLoading();
            }
        }
        
        function isValidCard(cardNumber) {
            // Simple Luhn algorithm validation
            let sum = 0;
            let isEven = false;
            
            for (let i = cardNumber.length - 1; i >= 0; i--) {
                let digit = parseInt(cardNumber[i]);
                
                if (isEven) {
                    digit *= 2;
                    if (digit > 9) {
                        digit -= 9;
                    }
                }
                
                sum += digit;
                isEven = !isEven;
            }
            
            return sum % 10 === 0;
        }
        
        function simulatePayment() {
            // Simulate payment processing delay
            return new Promise((resolve) => {
                setTimeout(resolve, 2000);
            });
        }
        
        function renderStep3() {
            const container = document.getElementById('step-content');
            container.innerHTML = `
                <div class="card text-center">
                    <div class="card-body p-5">
                        <i class="fas fa-check-circle fa-4x text-success mb-3"></i>
                        <h2>Payment Successful!</h2>
                        <p>Thank you for your purchase. Your tickets have been confirmed.</p>
                        <p class="text-muted">Order Number: ${orderData?.order_number}</p>
                        <div class="mt-4">
                            <a href="/dashboard" class="btn btn-primary">View My Tickets</a>
                            <a href="/events" class="btn btn-outline-primary ms-2">Browse More Events</a>
                        </div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
